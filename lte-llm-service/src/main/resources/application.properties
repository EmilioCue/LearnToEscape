spring.application.name=lte-llm-service

# Endpoint del runtime de Ollama (modo no-streaming, JSON).
ollama.api.url=http://localhost:11435/api/generate

# Modelo Ollama por defecto para la generación de salas.
# Ajustable por entorno; el servicio acepta cualquier modelo instalado en Ollama.
ollama.model=qwen2.5:7b
